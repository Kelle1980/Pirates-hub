<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pirates Template</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ── CARD ── */
  .card {
    width: 800px;
    height: 1000px;
    position: relative;
    overflow: hidden;
    background: #04060f;
    font-family: 'Barlow Condensed', sans-serif;
  }

  /* ── STARFIELD ── */
  .stars {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%,   rgba(10,40,140,0.55) 0%, transparent 60%),
      radial-gradient(ellipse at 15% 20%,  rgba(20,60,180,0.30) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 15%,  rgba(10,50,160,0.25) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 100%, rgba(5,15,50,1)      0%, transparent 55%),
      #04060f;
  }

  /* tiny star dots */
  .star-dots {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1.2px 1.2px at  4%  3%,  #a8c8ff 0%, transparent 100%),
      radial-gradient(1px   1px   at 12%  8%,  #c0d8ff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 22%  5%,  #90b8ff 0%, transparent 100%),
      radial-gradient(1px   1px   at 35% 12%,  #b0ccff 0%, transparent 100%),
      radial-gradient(1.2px 1.2px at 48%  2%,  #a8c4ff 0%, transparent 100%),
      radial-gradient(1px   1px   at 60%  9%,  #c8dcff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 73%  4%,  #90b0ff 0%, transparent 100%),
      radial-gradient(1px   1px   at 84%  7%,  #b4caff 0%, transparent 100%),
      radial-gradient(1.2px 1.2px at 93% 11%,  #a0bcff 0%, transparent 100%),
      radial-gradient(1px   1px   at  7% 18%,  #c0d4ff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 18% 25%,  #88aaff 0%, transparent 100%),
      radial-gradient(1px   1px   at 31% 22%,  #b8d0ff 0%, transparent 100%),
      radial-gradient(1.2px 1.2px at 55% 19%,  #a4c0ff 0%, transparent 100%),
      radial-gradient(1px   1px   at 67% 28%,  #ccd8ff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 79% 21%,  #8aaeff 0%, transparent 100%),
      radial-gradient(1px   1px   at 91% 24%,  #b0c8ff 0%, transparent 100%),
      radial-gradient(1.2px 1.2px at  2% 33%,  #9abcff 0%, transparent 100%),
      radial-gradient(1px   1px   at 14% 38%,  #c4d4ff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 27% 42%,  #86acff 0%, transparent 100%),
      radial-gradient(1px   1px   at 96%  2%,  #d0e0ff 0%, transparent 100%),
      radial-gradient(2px   2px   at 42% 15%,  #ffffff 0%, transparent 100%),
      radial-gradient(2px   2px   at 77%  6%,  #ffffff 0%, transparent 100%),
      radial-gradient(1.8px 1.8px at 20% 10%,  #e8f0ff 0%, transparent 100%),
      radial-gradient(1.8px 1.8px at 63% 22%,  #e4ecff 0%, transparent 100%);
    animation: twinkle 5s ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity:.7 } to { opacity:1 } }

  /* ── LIGHTNING arcs (bottom area) ── */
  .lightning {
    position: absolute;
    bottom: 220px; left: 0; right: 0;
    height: 60px;
    pointer-events: none;
  }
  .lightning svg { width: 100%; height: 100%; }

  /* ── TOP SECTION ── */
  .top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 220px;
    display: flex;
    align-items: flex-start;
    padding: 28px 32px 0;
    gap: 18px;
    z-index: 10;
  }

  .logo-img {
    width: 130px;
    flex-shrink: 0;
    margin-top: -4px;
  }

  .headline-wrap {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding-top: 6px;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 88px;
    line-height: 0.88;
    color: #fff;
    letter-spacing: 2px;
    text-shadow:
      0 0 20px rgba(60,120,255,0.6),
      3px 3px 0 #000;
    /* broken / chipped look via clip-path on each word handled below */
  }

  /* crack-effect: replicate the "slashed" letters from the reference */
  .headline .slash-word {
    display: block;
    position: relative;
  }
  .headline .slash-word::after {
    content: '';
    position: absolute;
    top: 10px; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to right, transparent 20%, rgba(80,140,255,0.25) 50%, transparent 80%);
    transform: skewX(-8deg);
  }

  /* ── PHOTO PLACEHOLDER ── */
  .photo-slot {
    position: absolute;
    top: 210px;
    left: 30px; right: 30px;
    height: 530px;
    border: 2.5px dashed rgba(80,130,255,0.45);
    border-radius: 4px;
    background: rgba(10,20,60,0.35);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 5;
  }

  .photo-slot .ph-icon {
    font-size: 56px;
    opacity: 0.35;
  }

  .photo-slot .ph-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(120,170,255,0.5);
  }

  /* edge glow around photo slot */
  .photo-slot::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 4px;
    box-shadow: inset 0 0 30px rgba(50,100,255,0.12), 0 0 20px rgba(50,100,255,0.08);
    pointer-events: none;
  }

  /* ── BOTTOM PANEL ── */
  .bottom-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 230px;
    background: linear-gradient(to top, #04060f 60%, transparent 100%);
    padding: 0 36px 24px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 0px;
    z-index: 10;
  }

  .komm {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 62px;
    color: #fff;
    letter-spacing: 3px;
    text-shadow: 0 0 25px rgba(60,120,255,0.5), 3px 3px 0 #000;
    line-height: 1;
    margin-bottom: 8px;
  }

  .info-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 5px;
  }

  .info-icon {
    font-size: 22px;
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .info-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #f0c040;
    text-shadow: 0 0 12px rgba(240,180,0,0.5), 1px 1px 0 #000;
  }

  .info-text em {
    font-style: normal;
    color: #fff;
    font-weight: 400;
  }

  .divider-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(80,130,255,0.4) 30%, rgba(80,130,255,0.4) 70%, transparent);
    margin: 8px 0;
  }

  .social-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 4px;
  }

  .ig-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .social-handle {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 1px;
    color: rgba(200,220,255,0.9);
  }

  /* ── HASHTAGS bottom-left ── */
  .hashtags {
    position: absolute;
    bottom: 240px;
    left: 36px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
    color: rgba(80,130,255,0.7);
    text-transform: uppercase;
    z-index: 10;
    line-height: 1.5;
  }

</style>
</head>
<body>

<div class="card">

  <!-- Background -->
  <div class="stars"></div>
  <div class="star-dots"></div>

  <!-- Lightning SVG -->
  <div class="lightning">
    <svg viewBox="0 0 800 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,30 Q80,5 160,28 Q240,50 320,22 Q400,0 480,30 Q560,55 640,25 Q720,5 800,30"
            fill="none" stroke="rgba(80,160,255,0.55)" stroke-width="1.5"/>
      <path d="M0,38 Q100,15 200,35 Q300,55 400,28 Q500,5 600,32 Q700,55 800,38"
            fill="none" stroke="rgba(100,180,255,0.30)" stroke-width="0.8"/>
      <!-- glow dots on arc -->
      <circle cx="200" cy="30" r="3" fill="rgba(120,200,255,0.8)"/>
      <circle cx="400" cy="22" r="2.5" fill="rgba(150,210,255,0.7)"/>
      <circle cx="600" cy="26" r="3" fill="rgba(120,200,255,0.8)"/>
    </svg>
  </div>

  <!-- TOP: Logo + Headline -->
  <div class="top">
    <img class="logo-img" src="/mnt/user-data/uploads/B12972B7-906D-4741-B8CE-36E924846FC6.png" alt="Pirates Logo" onerror="this.style.display='none'"/>
    <div class="headline-wrap">
      <div class="headline">
        <span class="slash-word">BOCK AUF</span>
        <span class="slash-word">FLAG</span>
        <span class="slash-word">FOOTBALL?</span>
      </div>
    </div>
  </div>

  <!-- PHOTO PLACEHOLDER -->
  <div class="photo-slot">
    <div class="ph-icon">📷</div>
    <div class="ph-label">Foto hier einfügen</div>
  </div>

  <!-- HASHTAGS -->
  <div class="hashtags">
    #stockelsdorfpirates<br>#bereitzumentern
  </div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-panel">
    <div class="komm">KOMM VORBEI!</div>
    <div class="info-row">
      <span class="info-icon">📍</span>
      <span class="info-text">WO?: <em>Rensefelder Weg</em></span>
    </div>
    <div class="info-row">
      <span class="info-icon">🕐</span>
      <span class="info-text">WANN?: <em>Mittwochs 19 Uhr</em></span>
    </div>
    <div class="divider-line"></div>
    <div class="social-row">
      <div class="ig-icon">📸</div>
      <div class="social-handle">@atsv.stockelsdorf</div>
    </div>
  </div>

</div>

</body>
</html>
